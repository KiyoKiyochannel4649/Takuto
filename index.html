<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>God Level FPS</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:20px;
}

#score{
position:absolute;
top:40px;
left:10px;
color:yellow;
font-size:22px;
}

#hp{
position:absolute;
top:70px;
left:10px;
color:red;
font-size:22px;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:30px;
}

</style>
</head>

<body>

<div id="ui">WASD移動 / クリック射撃</div>
<div id="score">Score: 0</div>
<div id="hp">HP: 100</div>
<div id="crosshair">+</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/PointerLockControls.js"></script>

<script>

let score = 0
let hp = 100

const scoreUI = document.getElementById("score")
const hpUI = document.getElementById("hp")

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls = new THREE.PointerLockControls(camera,document.body)

document.body.addEventListener("click",()=>{
controls.lock()
})

scene.add(controls.getObject())

const light = new THREE.HemisphereLight(0xffffff,0x444444)
scene.add(light)

const floorGeo = new THREE.PlaneGeometry(200,200)
const floorMat = new THREE.MeshBasicMaterial({color:0x333333})
const floor = new THREE.Mesh(floorGeo,floorMat)

floor.rotation.x = -Math.PI/2
scene.add(floor)

const enemies=[]

function createEnemy(){

const geo = new THREE.BoxGeometry(1,1,1)
const mat = new THREE.MeshBasicMaterial({color:0xff0000})

const enemy = new THREE.Mesh(geo,mat)

enemy.position.x=(Math.random()-0.5)*40
enemy.position.z=(Math.random()-0.5)*40
enemy.position.y=0.5

scene.add(enemy)

enemies.push(enemy)

}

setInterval(createEnemy,2000)

const bullets=[]

document.addEventListener("mousedown",()=>{

const geo=new THREE.SphereGeometry(0.1)
const mat=new THREE.MeshBasicMaterial({color:0xffff00})

const bullet=new THREE.Mesh(geo,mat)

bullet.position.copy(camera.position)

bullet.velocity=new THREE.Vector3()

camera.getWorldDirection(bullet.velocity)

scene.add(bullet)

bullets.push(bullet)

})

const move={forward:false,back:false,left:false,right:false}

document.addEventListener("keydown",(e)=>{

if(e.code==="KeyW")move.forward=true
if(e.code==="KeyS")move.back=true
if(e.code==="KeyA")move.left=true
if(e.code==="KeyD")move.right=true

})

document.addEventListener("keyup",(e)=>{

if(e.code==="KeyW")move.forward=false
if(e.code==="KeyS")move.back=false
if(e.code==="KeyA")move.left=false
if(e.code==="KeyD")move.right=false

})

function animate(){

requestAnimationFrame(animate)

const speed=0.15

if(move.forward)controls.moveForward(speed)
if(move.back)controls.moveForward(-speed)
if(move.left)controls.moveRight(-speed)
if(move.right)controls.moveRight(speed)

bullets.forEach((b,bi)=>{

b.position.add(b.velocity.clone().multiplyScalar(1))

enemies.forEach((e,ei)=>{

if(b.position.distanceTo(e.position)<1){

scene.remove(e)
scene.remove(b)

enemies.splice(ei,1)
bullets.splice(bi,1)

score++
scoreUI.innerText="Score: "+score

}

})

})

enemies.forEach((e)=>{

const dir = new THREE.Vector3()

dir.subVectors(camera.position,e.position).normalize()

e.position.add(dir.multiplyScalar(0.02))

if(e.position.distanceTo(camera.position)<1.5){

hp-=1
hpUI.innerText="HP: "+hp

if(hp<=0){

alert("GAME OVER\nScore: "+score)
location.reload()

}

}

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
