<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Face Merge Game</title>

<style>
body{
margin:0;
background:#ffd9b3;
text-align:center;
font-family:sans-serif;
}

#score{
font-size:28px;
margin:10px;
}

#next{
font-size:24px;
margin-bottom:10px;
}

canvas{
background:#fff;
border:4px solid #333;
}
</style>

</head>

<body>

<div id="score">Score: 0</div>
<div id="next">NEXT:</div>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let score = 0

const faces = ["🙂","😎","😆","🤩","😱","👑"]
const sizes = [20,25,30,35,40,50]

let objects=[]

let nextType = Math.floor(Math.random()*3)

function updateNextUI(){
document.getElementById("next").innerText="NEXT: "+faces[nextType]
}

updateNextUI()

// 効果音
const dropSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3")
const mergeSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3")

function spawnFace(x){

dropSound.currentTime = 0
dropSound.play()

objects.push({
x:x,
y:50,
vx:0,
vy:0,
type:nextType
})

nextType = Math.floor(Math.random()*3)

updateNextUI()

}

canvas.addEventListener("click",(e)=>{

const rect = canvas.getBoundingClientRect()
const x = e.clientX - rect.left

spawnFace(x)

})

function update(){

objects.forEach(o=>{

o.vy += 0.3
o.y += o.vy

const r = sizes[o.type]

if(o.y+r > canvas.height){

o.y = canvas.height-r
o.vy *= -0.3

}

})

for(let i=0;i<objects.length;i++){
for(let j=i+1;j<objects.length;j++){

const a = objects[i]
const b = objects[j]

const dx=a.x-b.x
const dy=a.y-b.y
const dist=Math.sqrt(dx*dx+dy*dy)

const ra=sizes[a.type]
const rb=sizes[b.type]

if(dist < ra+rb){

if(a.type === b.type && a.type < faces.length-1){

mergeSound.currentTime = 0
mergeSound.play()

a.type++
objects.splice(j,1)

score += 10
document.getElementById("score").innerText="Score: "+score

break

}

}

}
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.textAlign="center"
ctx.textBaseline="middle"

objects.forEach(o=>{

ctx.font = sizes[o.type]*2 + "px serif"
ctx.fillText(faces[o.type],o.x,o.y)

})

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
