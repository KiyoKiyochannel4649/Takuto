<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Suika Game</title>

<style>
body{
margin:0;
background:#f2d6a2;
text-align:center;
font-family:sans-serif;
}

#score{
font-size:28px;
margin:10px;
}

canvas{
background:#fff3d1;
border:4px solid #333;
}
</style>

</head>

<body>

<div id="score">Score: 0</div>
<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let score = 0

const fruits = [
{r:15,color:"#ff4d4d"},
{r:20,color:"#ff944d"},
{r:25,color:"#ffd24d"},
{r:30,color:"#8cff66"},
{r:35,color:"#66ccff"},
{r:45,color:"#ff66cc"}
]

let objects=[]

function spawnFruit(x){

const type = Math.floor(Math.random()*3)

objects.push({
x:x,
y:50,
vx:0,
vy:0,
type:type
})

}

canvas.addEventListener("click",(e)=>{

const rect = canvas.getBoundingClientRect()
const x = e.clientX - rect.left

spawnFruit(x)

})

function update(){

objects.forEach(o=>{

o.vy += 0.3
o.y += o.vy

const r = fruits[o.type].r

if(o.y+r > canvas.height){

o.y = canvas.height-r
o.vy *= -0.3

}

})

for(let i=0;i<objects.length;i++){
for(let j=i+1;j<objects.length;j++){

const a = objects[i]
const b = objects[j]

const dx=a.x-b.x
const dy=a.y-b.y
const dist=Math.sqrt(dx*dx+dy*dy)

const ra=fruits[a.type].r
const rb=fruits[b.type].r

if(dist < ra+rb){

if(a.type === b.type && a.type < fruits.length-1){

a.type++
objects.splice(j,1)

score += 10
document.getElementById("score").innerText="Score: "+score

break

}

}

}
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

objects.forEach(o=>{

ctx.beginPath()
ctx.arc(o.x,o.y,fruits[o.type].r,0,Math.PI*2)
ctx.fillStyle=fruits[o.type].color
ctx.fill()

})

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
